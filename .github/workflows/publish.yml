name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: |
          dotnet pack src/Postbox.Core/Postbox.Core.csproj --no-build --configuration Release --output ./nupkg
          dotnet pack src/Postbox.EFCore/Postbox.EFCore.csproj --no-build --configuration Release --output ./nupkg
          dotnet pack src/Postbox.PostgreSQL/Postbox.PostgreSQL.csproj --no-build --configuration Release --output ./nupkg
          dotnet pack src/Postbox.SqlServer/Postbox.SqlServer.csproj --no-build --configuration Release --output ./nupkg
          dotnet pack src/Postbox.Transport.RabbitMQ/Postbox.Transport.RabbitMQ.csproj --no-build --configuration Release --output ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
